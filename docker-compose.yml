services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./upload:/app/upload
    env_file:
      - ./backend/.env
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - redis
    environment:
      - TZ=Asia/Bangkok

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    environment:
      - TZ=Asia/Bangkok

  db:
    image: postgres:17
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    env_file:
      - ./backend/.env
    environment:
      - TZ=Asia/Bangkok
    ports:
      - "5434:5432"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres-data:
