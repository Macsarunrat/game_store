services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./upload:/app/upload
    env_file:
      - .env
    extra_hosts:
      - "localhost:host-gateway"
    depends_on:
      - redis
    environment:
      - TZ=Asia/Bangkok

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:17
    restart : always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5434:5432"
volumes:
  postgres-data:

