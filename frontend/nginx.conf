server {
    listen 80;
    server_name localhost;

    # 1. ส่วนของหน้าบ้าน (Angular) - ของเดิมของคุณ
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. เพิ่มส่วนนี้สำหรับส่งต่อ Request ไปหาหลังบ้าน (Backend)
    location /api/ {
        # 'backend' คือชื่อ service หลังบ้านในไฟล์ docker-compose.yml
        # '8000' คือพอร์ตที่หลังบ้านเปิดไว้ภายใน Container
        proxy_pass http://backend:8000; 

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # ส่งต่อข้อมูลที่จำเป็นของฝั่ง Client ไปให้หลังบ้าน
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # จัดการหน้า Error ตามปกติ
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
